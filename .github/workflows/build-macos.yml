name: Build macOS

on:
  workflow_dispatch:
  push:
    branches:
      - main

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-14
            arch: arm64
          - os: macos-15-intel
            arch: x86_64

    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt
          python -m pip install pyinstaller

      - name: Generate macOS icon
        shell: bash
        run: |
          rm -rf build_assets/app.iconset build_assets/app_icon.icns
          mkdir -p build_assets/app.iconset
          sips -z 16 16 app_icon.png --out build_assets/app.iconset/icon_16x16.png
          sips -z 32 32 app_icon.png --out build_assets/app.iconset/icon_16x16@2x.png
          sips -z 32 32 app_icon.png --out build_assets/app.iconset/icon_32x32.png
          sips -z 64 64 app_icon.png --out build_assets/app.iconset/icon_32x32@2x.png
          sips -z 128 128 app_icon.png --out build_assets/app.iconset/icon_128x128.png
          sips -z 256 256 app_icon.png --out build_assets/app.iconset/icon_128x128@2x.png
          sips -z 256 256 app_icon.png --out build_assets/app.iconset/icon_256x256.png
          sips -z 512 512 app_icon.png --out build_assets/app.iconset/icon_256x256@2x.png
          sips -z 512 512 app_icon.png --out build_assets/app.iconset/icon_512x512.png
          cp app_icon.png build_assets/app.iconset/icon_512x512@2x.png
          iconutil -c icns build_assets/app.iconset -o build_assets/app_icon.icns

      - name: Build app bundle
        run: pyinstaller macos_build.spec --clean --noconfirm --distpath dist_macos/${{ matrix.arch }} --workpath build/macos/${{ matrix.arch }}

      - name: Archive app bundle
        shell: bash
        run: |
          cd dist_macos/${{ matrix.arch }}
          ditto -c -k --sequesterRsrc --keepParent "批量重命名.app" "批量重命名-${{ matrix.arch }}.zip"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: 批量重命名-macos-${{ matrix.arch }}
          path: dist_macos/${{ matrix.arch }}/批量重命名-${{ matrix.arch }}.zip
